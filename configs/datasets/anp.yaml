  - dataset_id: anp_reference_oil_price
    source: anp
    priority: P2
    frequency: monthly_or_annual
    raw_format: csv_or_xlsx_by_year
    canonical_table: anp_reference_oil_price
    partition_keys: [year]
    primary_keys: [ref_date, field_or_state]
    quality_checks: [required_columns_present, no_duplicate_primary_keys]
    source_map_status: source_map_only_petroleum_reference
    source_urls: []
