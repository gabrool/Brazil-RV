    filename_template: "ENA_DIARIO_SUBSISTEMA_{year}.csv"
    availability_policy: ons_conservative_next_business_day
    license_note: CC-BY; cite ONS and the dataset/source.
    notes: Daily natural inflow energy by subsystem. Preserve official raw type/value fields.

