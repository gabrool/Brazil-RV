source: ons
free_access_default: true
requires_auth_default: false
point_in_time_required: true

raw_storage:
  path_template: data/raw/ons/{dataset_id}/{download_date}/
  manifest_path: data/manifests/ons/downloads.jsonl

bronze_storage:
  path_template: data/bronze/ons/{dataset_id}/
  format: parquet

silver_storage:
  path_template: data/silver/{dataset_id}/
  format: parquet

datasets:
  - dataset_id: ons_ear_subsystem_daily
    source: ons
    priority: P0
    frequency: daily
    raw_format: csv_annual
    canonical_table: ons_ear_subsystem_daily
    partition_keys: [year]
    primary_keys: [ref_date, subsystem]
    quality_checks:
      - required_columns_present
      - no_duplicate_primary_keys
      - ref_date_not_null
      - available_date_not_null
      - available_date_on_or_after_ref_date
    source_map_status: live_download
    package_slug: ear-diario-por-subsistema
    resource_name_prefix: EAR_Diario_por_Subsistema
    direct_url_template: "https://ons-aws-prod-opendata.s3.amazonaws.com/dataset/ear_subsistema_di/EAR_DIARIO_SUBSISTEMA_{year}.csv"
    filename_template: "EAR_DIARIO_SUBSISTEMA_{year}.csv"
    availability_policy: ons_conservative_next_business_day
    license_note: CC-BY; cite ONS and the dataset/source.
    notes: Daily stored energy by subsystem. Preserve official values only.

  - dataset_id: ons_ena_subsystem_daily
    source: ons
    priority: P0
    frequency: daily
    raw_format: csv_annual
    canonical_table: ons_ena_subsystem_daily
    partition_keys: [year]
    primary_keys: [ref_date, subsystem, ena_type]
    quality_checks:
      - required_columns_present
      - no_duplicate_primary_keys
      - ref_date_not_null
      - available_date_not_null
      - available_date_on_or_after_ref_date
