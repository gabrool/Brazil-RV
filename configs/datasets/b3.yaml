source: b3
free_access_default: true
requires_auth_default: false
point_in_time_required: true

raw_storage:
  path_template: data/raw/b3/{dataset_id}/{download_date}/
  manifest_path: data/manifests/b3/downloads.jsonl

bronze_storage:
  path_template: data/bronze/b3/{dataset_id}/
  format: parquet

silver_storage:
  path_template: data/silver/{canonical_table}/
  format: parquet

datasets:
  - dataset_id: b3_futures_settlements
    source: b3
    priority: P0
    frequency: daily
    free_access: true
    requires_auth: false
    point_in_time_required: true
    raw_format: html_or_csv
    canonical_table: market_daily
    partition_keys: [year]
    primary_keys: [ref_date, commodity, maturity_code]
    quality_checks:
      - row_count_not_zero
      - no_duplicate_primary_keys
      - positive_settlement_where_present
      - ref_date_not_null
      - available_date_not_null
      - available_date_on_or_after_ref_date
      - required_columns_present
    source_urls:
      - name: b3_sistema_pregao
        url_template: https://www2.bmf.com.br/pages/portal/bmfbovespa/lumis/lum-sistema-pregao-ptBR.asp
        params:
          Data: "{ref_date:%d/%m/%Y}"
          Mercadoria: "{commodity}"
        filename_template: "{dataset_id}_{commodity}_{ref_date:%Y%m%d}.html"
    request_defaults:
      commodity_roots: [DI1, DOL, WDO, IND, WIN, DAP, DDI, FRC]
    license_note: Public B3 website data; verify current B3 terms before redistribution.
    notes: Daily futures settlement/session table, downloaded per commodity root.

  - dataset_id: b3_futures_contract_master
    source: b3
    priority: P0
    frequency: static_or_periodic
    free_access: true
    requires_auth: false
    point_in_time_required: true
    raw_format: manual_yaml
    canonical_table: reference_contract
    partition_keys: []
    primary_keys: [contract_id]
    quality_checks:
      - no_duplicate_primary_keys
      - maturity_date_present_where_required
      - required_columns_present
    source_urls: []
    license_note: Derived from public B3 product specifications and project-maintained manual inputs.
    notes: Manual/source-map driven until a stable free machine-readable B3 contract master is confirmed.

  - dataset_id: b3_holiday_calendar
