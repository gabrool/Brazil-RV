metadata_policy:
  source_catalog_pattern: "https://dadosabertos.bcb.gov.br/dataset/{series_id}-sgs"
  source_api_pattern: "https://api.bcb.gov.br/dados/serie/bcdata.sgs.{series_id}/dados?formato=json"
  notes: Unknown publication timing or revision behavior keeps a series out of model-ready panels.

series:
  - series_id: 11
    slug: selic_over
    name: Selic overnight / Selic daily
    category: rates
    frequency: daily
    unit: percent_annualized
    availability_policy: next_business_day
    availability_lag_days: null
    availability_basis: source_date_only
    revision_policy: unrevised
    model_usable: true
    source_reference_url: "https://dadosabertos.bcb.gov.br/dataset/11-taxa-de-juros---selic"
    notes: Official BCB SGS code 11. Timing rule retained from the existing model-ready configuration.

