rules:
  - rule_id: b3_continuous_futures_settlement
    priority: 10
    selector: {panel: continuous_futures_daily, value_name: settlement}
    model_default: false
    model_default_reason: Superseded by b3_futures_feature log settlement and return rows.
    semantic_type: futures_quote_level
    raw_unit: quote
    stationarity: nonstationary_level
    preprocessing: {transform: signed_log1p, winsorization: train_quantile, winsor_lower: 0.001, winsor_upper: 0.999, hard_min: null, hard_max: null, scaler: train_robust_zscore, fit_scope: train_only, missing_policy: preserve_null_add_mask, positive_required: false, allow_negative: true, notes: Generic safe transform across positive price-like and non-price futures quotes; later source-specific futures transforms may replace this.}
  - rule_id: b3_continuous_futures_quote_diff
    priority: 20
    selector: {panel: continuous_futures_daily, value_name_regex: '^(quote_diff_1d|same_contract_quote_diff_1d)$'}
    model_default: false
    model_default_reason: Superseded by b3_futures_feature return and roll-gap rows.
    semantic_type: quote_change
    raw_unit: quote_change
    stationarity: stationaryish
    preprocessing: {transform: identity, winsorization: train_quantile, winsor_lower: 0.001, winsor_upper: 0.999, hard_min: null, hard_max: null, scaler: train_robust_zscore, fit_scope: train_only, missing_policy: preserve_null_add_mask, positive_required: false, allow_negative: true, notes: Return-style quote changes are already differenced and only require train-only robust treatment.}
  - rule_id: b3_continuous_futures_quote_return
    priority: 30
    selector: {panel: continuous_futures_daily, value_name_regex: '^(quote_pct_change_1d|same_contract_quote_pct_change_1d)$'}
    model_default: false
    model_default_reason: Superseded by b3_futures_feature log-return rows.
    semantic_type: return
    raw_unit: return_fraction
    stationarity: stationaryish
    preprocessing: {transform: already_return, winsorization: train_quantile, winsor_lower: 0.001, winsor_upper: 0.999, hard_min: null, hard_max: null, scaler: train_robust_zscore, fit_scope: train_only, missing_policy: preserve_null_add_mask, positive_required: false, allow_negative: true, notes: Percentage-change features are already return-like.}
  - rule_id: b3_continuous_futures_liquidity
    priority: 40
    selector: {panel: continuous_futures_daily, value_name_regex: '^(volume|open_interest)$'}
    model_default: false
    model_default_reason: Superseded by b3_futures_feature log liquidity and volume-to-open-interest rows.
    semantic_type: liquidity_count_or_notional
    raw_unit: count_or_notional
    stationarity: count
    preprocessing: {transform: count_log1p, winsorization: train_quantile, winsor_lower: 0.001, winsor_upper: 0.999, hard_min: null, hard_max: null, scaler: train_robust_zscore, fit_scope: train_only, missing_policy: preserve_null_add_mask, positive_required: false, allow_negative: false, notes: Liquidity/count-like values use train-only log1p and robust scaling.}
  - rule_id: b3_continuous_futures_maturity_distance
    priority: 50
    selector: {panel: continuous_futures_daily, value_name_regex: '^(business_days_to_maturity|days_to_maturity_calendar)$'}
    model_default: true
    model_default_reason: Include contract maturity-distance controls.
    semantic_type: contract_maturity_distance
    raw_unit: days
    stationarity: bounded
    preprocessing: {transform: identity, winsorization: hard_clip_then_train_quantile, winsor_lower: 0.001, winsor_upper: 0.999, hard_min: 0, hard_max: 3000, scaler: train_robust_zscore, fit_scope: train_only, missing_policy: preserve_null_add_mask, positive_required: false, allow_negative: false, notes: Maturity distance is bounded and clipped before train-only robust scaling.}
  - rule_id: b3_continuous_futures_flags
    priority: 60
    selector: {panel: continuous_futures_daily, value_name_regex: '^(is_roll_date|is_tradeable)$'}
    model_default: true
    model_default_reason: Include tradeability and roll flags as binary controls.
    semantic_type: contract_flag
    raw_unit: boolean
    stationarity: binary
    preprocessing: {transform: binary, winsorization: none, winsor_lower: null, winsor_upper: null, hard_min: null, hard_max: null, scaler: none, fit_scope: train_only, missing_policy: false_fill, positive_required: false, allow_negative: false, notes: Binary flags use false-fill and no fitted statistics.}
  - rule_id: b3_di_grid_implied_annual_rate_bp
    priority: 100
    selector: {panel: di_curve_grid_daily, value_name: implied_annual_rate_bp}
    model_default: false
    model_default_reason: Superseded by b3_di_curve_feature rate level, shape, and forward rows.
    semantic_type: brl_di_rate_level_bp
    raw_unit: basis_points
    stationarity: stationaryish
    preprocessing: {transform: identity, winsorization: train_mad, winsor_lower: -10, winsor_upper: 10, hard_min: null, hard_max: null, scaler: train_robust_zscore, fit_scope: train_only, missing_policy: preserve_null_add_mask, positive_required: false, allow_negative: true, notes: DI rate levels are already basis points; train MAD bounds are MAD multiples.}
  - rule_id: b3_di_grid_log_discount_factor
    priority: 110
    selector: {panel: di_curve_grid_daily, value_name: log_discount_factor}
    model_default: false
    model_default_reason: Superseded by b3_di_curve_feature log discount-factor rows.
    semantic_type: brl_di_log_discount_factor
    raw_unit: log_discount_factor
    stationarity: stationaryish
    preprocessing: {transform: already_log, winsorization: train_quantile, winsor_lower: 0.001, winsor_upper: 0.999, hard_min: null, hard_max: null, scaler: train_robust_zscore, fit_scope: train_only, missing_policy: preserve_null_add_mask, positive_required: false, allow_negative: true, notes: Log discount factors are already logged and can be negative.}
  - rule_id: b3_di_grid_tenor_business_days
    priority: 120
    selector: {panel: di_curve_grid_daily, value_name: tenor_business_days}
    model_default: true
    model_default_reason: Include curve tenor as a bounded curve-coordinate feature.
    semantic_type: curve_tenor
    raw_unit: business_days
    stationarity: bounded
    preprocessing: {transform: identity, winsorization: hard_clip_then_train_quantile, winsor_lower: 0.001, winsor_upper: 0.999, hard_min: 0, hard_max: 3000, scaler: train_robust_zscore, fit_scope: train_only, missing_policy: preserve_null_add_mask, positive_required: false, allow_negative: false, notes: Curve tenors are clipped to non-negative business-day distances.}
  - rule_id: b3_di_grid_flags
    priority: 130
    selector: {panel: di_curve_grid_daily, value_name_regex: '^(is_interpolated|is_extrapolated|has_curve_value)$'}
    model_default: true
    model_default_reason: Include DI curve construction flags as diagnostics.
    semantic_type: curve_construction_flag
    raw_unit: boolean
    stationarity: binary
    preprocessing: {transform: binary, winsorization: none, winsor_lower: null, winsor_upper: null, hard_min: null, hard_max: null, scaler: none, fit_scope: train_only, missing_policy: false_fill, positive_required: false, allow_negative: false, notes: Binary interpolation/extrapolation/value flags use false-fill and no fitted statistics.}
  - rule_id: b3_di_grid_redundant_levels
    priority: 140
    selector: {panel: di_curve_grid_daily, value_name_regex: '^(curve_value|implied_annual_rate|discount_factor)$'}
    model_default: false
    model_default_reason: Duplicated by implied_annual_rate_bp and log_discount_factor; avoid double-counting the same curve state.
    semantic_type: redundant_di_curve_level
    raw_unit: curve_level
    stationarity: stationaryish
    preprocessing: {transform: identity, winsorization: train_quantile, winsor_lower: 0.001, winsor_upper: 0.999, hard_min: null, hard_max: null, scaler: train_robust_zscore, fit_scope: train_only, missing_policy: preserve_null_add_mask, positive_required: false, allow_negative: true, notes: Compatibility level columns remain emitted but are not first-model defaults.}
  - rule_id: b3_di_contract_raw_settlement_pu
    priority: 200
    selector: {panel: di_curve_contract_daily, value_name: raw_settlement_pu}
    model_default: false
    model_default_reason: Raw PU is economically transformed into rate and discount-factor fields.
    semantic_type: raw_di_pu
    raw_unit: pu
    stationarity: nonstationary_level
    preprocessing: {transform: log_positive, winsorization: train_quantile, winsor_lower: 0.001, winsor_upper: 0.999, hard_min: null, hard_max: null, scaler: train_robust_zscore, fit_scope: train_only, missing_policy: preserve_null_add_mask, positive_required: true, allow_negative: false, notes: Raw PU preprocessing is defined for audit or future opt-in use only.}
  - rule_id: b3_di_contract_implied_annual_rate_bp
    priority: 210
    selector: {panel: di_curve_contract_daily, value_name: implied_annual_rate_bp}
    model_default: false
    model_default_reason: Superseded by b3_di_curve_feature rate level, shape, and forward rows.
    semantic_type: brl_di_rate_level_bp
    raw_unit: basis_points
    stationarity: stationaryish
    preprocessing: {transform: identity, winsorization: train_mad, winsor_lower: -10, winsor_upper: 10, hard_min: null, hard_max: null, scaler: train_robust_zscore, fit_scope: train_only, missing_policy: preserve_null_add_mask, positive_required: false, allow_negative: true, notes: DI rate levels are already basis points; train MAD bounds are MAD multiples.}
  - rule_id: b3_di_contract_log_discount_factor
    priority: 220
    selector: {panel: di_curve_contract_daily, value_name: log_discount_factor}
    model_default: false
    model_default_reason: Superseded by b3_di_curve_feature log discount-factor rows.
    semantic_type: brl_di_log_discount_factor
    raw_unit: log_discount_factor
    stationarity: stationaryish
    preprocessing: {transform: already_log, winsorization: train_quantile, winsor_lower: 0.001, winsor_upper: 0.999, hard_min: null, hard_max: null, scaler: train_robust_zscore, fit_scope: train_only, missing_policy: preserve_null_add_mask, positive_required: false, allow_negative: true, notes: Log discount factors are already logged and can be negative.}
  - rule_id: b3_di_contract_maturity_distance
    priority: 230
    selector: {panel: di_curve_contract_daily, value_name: business_days_to_maturity}
    model_default: true
    model_default_reason: Include contract business-day maturity distance.
    semantic_type: contract_maturity_distance
    raw_unit: business_days
    stationarity: bounded
    preprocessing: {transform: identity, winsorization: hard_clip_then_train_quantile, winsor_lower: 0.001, winsor_upper: 0.999, hard_min: 0, hard_max: 3000, scaler: train_robust_zscore, fit_scope: train_only, missing_policy: preserve_null_add_mask, positive_required: false, allow_negative: false, notes: Maturity distance is bounded and clipped before train-only robust scaling.}
  - rule_id: b3_di_contract_liquidity
    priority: 240
    selector: {panel: di_curve_contract_daily, value_name_regex: '^(volume|open_interest)$'}
    model_default: true
    model_default_reason: Include DI contract liquidity and open-interest signals.
    semantic_type: liquidity_count_or_notional
    raw_unit: count_or_notional
    stationarity: count
    preprocessing: {transform: count_log1p, winsorization: train_quantile, winsor_lower: 0.001, winsor_upper: 0.999, hard_min: null, hard_max: null, scaler: train_robust_zscore, fit_scope: train_only, missing_policy: preserve_null_add_mask, positive_required: false, allow_negative: false, notes: Liquidity/count-like values use train-only log1p and robust scaling.}
  - rule_id: b3_di_contract_flags
    priority: 250
    selector: {panel: di_curve_contract_daily, value_name: is_observed}
    model_default: true
    model_default_reason: Include observed-contract flag as a diagnostic model feature.
    semantic_type: curve_observation_flag
    raw_unit: boolean
    stationarity: binary
    preprocessing: {transform: binary, winsorization: none, winsor_lower: null, winsor_upper: null, hard_min: null, hard_max: null, scaler: none, fit_scope: train_only, missing_policy: false_fill, positive_required: false, allow_negative: false, notes: Binary observed flag uses false-fill and no fitted statistics.}
  - rule_id: b3_di_contract_rate_changes
    priority: 260
    selector: {panel: di_curve_contract_daily, value_name_regex: '^(curve_value_diff_1d|implied_annual_rate_bp_change_1d)$'}
    model_default: true
    model_default_reason: Include one-day DI rate changes after robust treatment.
    semantic_type: brl_di_rate_change
    raw_unit: basis_points_or_rate_change
    stationarity: stationaryish
    preprocessing: {transform: identity, winsorization: train_quantile, winsor_lower: 0.001, winsor_upper: 0.999, hard_min: null, hard_max: null, scaler: train_robust_zscore, fit_scope: train_only, missing_policy: preserve_null_add_mask, positive_required: false, allow_negative: true, notes: DI rate changes are stationaryish change features.}
  - rule_id: b3_di_contract_log_discount_factor_change
    priority: 270
    selector: {panel: di_curve_contract_daily, value_name: log_discount_factor_change_1d}
    model_default: true
    model_default_reason: Include one-day log discount-factor changes.
    semantic_type: brl_di_log_discount_factor_change
    raw_unit: log_change
    stationarity: stationaryish
    preprocessing: {transform: already_return, winsorization: train_quantile, winsor_lower: 0.001, winsor_upper: 0.999, hard_min: null, hard_max: null, scaler: train_robust_zscore, fit_scope: train_only, missing_policy: preserve_null_add_mask, positive_required: false, allow_negative: true, notes: Log discount-factor changes are already return-like.}
  - rule_id: b3_di_contract_redundant_levels
    priority: 280
    selector: {panel: di_curve_contract_daily, value_name_regex: '^(curve_value|implied_annual_rate|discount_factor)$'}
    model_default: false
    model_default_reason: Duplicated by implied_annual_rate_bp and log_discount_factor; avoid double-counting the same curve state.
    semantic_type: redundant_di_curve_level
    raw_unit: curve_level
    stationarity: stationaryish
    preprocessing: {transform: identity, winsorization: train_quantile, winsor_lower: 0.001, winsor_upper: 0.999, hard_min: null, hard_max: null, scaler: train_robust_zscore, fit_scope: train_only, missing_policy: preserve_null_add_mask, positive_required: false, allow_negative: true, notes: Compatibility level columns remain emitted but are not first-model defaults.}
  - rule_id: b3_di_contract_redundant_curve_pct_change
    priority: 290
    selector: {panel: di_curve_contract_daily, value_name: curve_value_pct_change_1d}
    model_default: false
    model_default_reason: Percent change of the redundant curve_value compatibility field is not a first-model default.
    semantic_type: redundant_di_curve_change
    raw_unit: return_fraction
    stationarity: stationaryish
    preprocessing: {transform: already_return, winsorization: train_quantile, winsor_lower: 0.001, winsor_upper: 0.999, hard_min: null, hard_max: null, scaler: train_robust_zscore, fit_scope: train_only, missing_policy: preserve_null_add_mask, positive_required: false, allow_negative: true, notes: Defined for audit or future opt-in use only; canonical changes are bp and log-DF changes.}
  - rule_id: b3_index_daily_prices
    priority: 300
    selector: {panel: index_daily, value_name_regex: '^(close|open|high|low)$'}
    model_default: false
    model_default_reason: Superseded by b3_index_feature log close, returns, range, and drawdown rows.
    semantic_type: adjusted_or_index_level
    raw_unit: index_points
    stationarity: nonstationary_level
    preprocessing: {transform: log_positive, winsorization: train_quantile, winsor_lower: 0.001, winsor_upper: 0.999, hard_min: null, hard_max: null, scaler: train_robust_zscore, fit_scope: train_only, missing_policy: preserve_null_add_mask, positive_required: true, allow_negative: false, notes: Index levels must be positive and are logged before train-only robust scaling.}
  - rule_id: b3_index_daily_liquidity
    priority: 310
    selector: {panel: index_daily, value_name_regex: '^(volume|financial_volume|number_of_trades)$'}
    model_default: false
    model_default_reason: Superseded by b3_index_feature log liquidity rows.
    semantic_type: liquidity_count_or_notional
    raw_unit: count_or_notional
    stationarity: count
    preprocessing: {transform: count_log1p, winsorization: train_quantile, winsor_lower: 0.001, winsor_upper: 0.999, hard_min: null, hard_max: null, scaler: train_robust_zscore, fit_scope: train_only, missing_policy: preserve_null_add_mask, positive_required: false, allow_negative: false, notes: Liquidity/count-like values use train-only log1p and robust scaling.}
  - rule_id: b3_listed_market_price_levels
    priority: 400
    selector: {panel: listed_market_daily, value_name_regex: '^(open|high|low|close|average|best_bid|best_ask)$'}
    model_default: false
    model_default_reason: B3 COTAHIST individual-security quotes are not corporate-action adjusted; raw price levels should not enter the first model.
    semantic_type: unadjusted_equity_quote_level
    raw_unit: price
    stationarity: nonstationary_level
    preprocessing: {transform: log_positive, winsorization: train_quantile, winsor_lower: 0.001, winsor_upper: 0.999, hard_min: null, hard_max: null, scaler: train_robust_zscore, fit_scope: train_only, missing_policy: preserve_null_add_mask, positive_required: true, allow_negative: false, notes: Preprocessing is defined only for future explicit opt-in after corporate-action handling.}
  - rule_id: b3_listed_market_liquidity
    priority: 410
    selector: {panel: listed_market_daily, value_name_regex: '^(volume|financial_volume|number_of_trades)$'}
    model_default: false
    model_default_reason: Individual-security universe and liquidity features need security-master and corporate-action cleanup before model default.
    semantic_type: unadjusted_security_liquidity
    raw_unit: count_or_notional
    stationarity: count
    preprocessing: {transform: count_log1p, winsorization: train_quantile, winsor_lower: 0.001, winsor_upper: 0.999, hard_min: null, hard_max: null, scaler: train_robust_zscore, fit_scope: train_only, missing_policy: preserve_null_add_mask, positive_required: false, allow_negative: false, notes: Preprocessing is defined only for future explicit opt-in after security-master cleanup.}
  - rule_id: b3_index_composition_weight
    priority: 500
    selector: {panel: index_composition_daily, value_name: weight}
    model_default: false
    model_default_reason: Superseded by b3_index_composition_feature aggregate concentration rows.
    semantic_type: index_weight_percent_or_fraction
    raw_unit: percent_or_fraction
    stationarity: bounded
    preprocessing: {transform: identity, winsorization: hard_clip_then_train_quantile, winsor_lower: 0.001, winsor_upper: 0.999, hard_min: 0, hard_max: 100, scaler: train_robust_zscore, fit_scope: train_only, missing_policy: preserve_null_add_mask, positive_required: false, allow_negative: false, notes: Current weights are treated as percent-like and clipped to 0 to 100 until a fraction unit is proven.}
  - rule_id: b3_index_composition_theoretical_quantity
    priority: 510
    selector: {panel: index_composition_daily, value_name: theoretical_quantity}
    model_default: false
    model_default_reason: Large nonstationary security-specific quantity; use weights for the first model.
    semantic_type: index_security_quantity
    raw_unit: shares
    stationarity: nonstationary_level
    preprocessing: {transform: log1p_positive, winsorization: train_quantile, winsor_lower: 0.001, winsor_upper: 0.999, hard_min: null, hard_max: null, scaler: train_robust_zscore, fit_scope: train_only, missing_policy: preserve_null_add_mask, positive_required: false, allow_negative: false, notes: Preprocessing is defined only for future explicit opt-in.}
  - rule_id: b3_di_curve_feature_rate_levels_shapes_forwards
    priority: 600
    selector: {source_family: b3_di_curve_feature, value_name_regex: '^(rate_level_bp|slope_[0-9_]+_bp|butterfly_[0-9_]+_bp|forward_[0-9_]+_bp|rolldown_[0-9]+bd_bp)$'}
    model_default: true
    model_default_reason: Canonical upgraded DI curve level, shape, forward, and rolldown features.
    semantic_type: brl_di_curve_rate_or_shape_bp
    raw_unit: basis_points
    stationarity: stationaryish
    preprocessing: {transform: identity, winsorization: train_mad, winsor_lower: -10, winsor_upper: 10, hard_min: null, hard_max: null, scaler: train_robust_zscore, fit_scope: train_only, missing_policy: preserve_null_add_mask, positive_required: false, allow_negative: true, notes: Upgraded DI curve bp features are deterministic and use train-only MAD clipping.}
  - rule_id: b3_di_curve_feature_rate_changes
    priority: 610
    selector: {source_family: b3_di_curve_feature, value_name_regex: '^rate_change_[0-9]+bd_bp$'}
    model_default: true
    model_default_reason: Canonical upgraded DI curve rate-change features.
    semantic_type: brl_di_curve_rate_change_bp
    raw_unit: basis_points
    stationarity: stationaryish
    preprocessing: {transform: identity, winsorization: train_quantile, winsor_lower: 0.001, winsor_upper: 0.999, hard_min: null, hard_max: null, scaler: train_robust_zscore, fit_scope: train_only, missing_policy: preserve_null_add_mask, positive_required: false, allow_negative: true, notes: DI curve bp changes are already differenced and require only train-only robust treatment.}
  - rule_id: b3_di_curve_feature_log_discount_factor
    priority: 620
    selector: {source_family: b3_di_curve_feature, value_name: log_discount_factor}
    model_default: true
    model_default_reason: Canonical upgraded DI curve log discount-factor feature.
    semantic_type: brl_di_curve_log_discount_factor
    raw_unit: log_discount_factor
    stationarity: stationaryish
    preprocessing: {transform: already_log, winsorization: train_quantile, winsor_lower: 0.001, winsor_upper: 0.999, hard_min: null, hard_max: null, scaler: train_robust_zscore, fit_scope: train_only, missing_policy: preserve_null_add_mask, positive_required: false, allow_negative: true, notes: Log discount factors are already logged and can be negative.}
  - rule_id: b3_di_curve_feature_log_df_changes
    priority: 630
    selector: {source_family: b3_di_curve_feature, value_name_regex: '^log_df_change_[0-9]+bd$'}
    model_default: true
    model_default_reason: Canonical upgraded DI curve log discount-factor changes.
    semantic_type: brl_di_curve_log_discount_factor_change
    raw_unit: log_change
    stationarity: stationaryish
    preprocessing: {transform: already_return, winsorization: train_quantile, winsor_lower: 0.001, winsor_upper: 0.999, hard_min: null, hard_max: null, scaler: train_robust_zscore, fit_scope: train_only, missing_policy: preserve_null_add_mask, positive_required: false, allow_negative: true, notes: Log discount-factor changes are already return-like.}
  - rule_id: b3_di_curve_feature_flags
    priority: 640
    selector: {source_family: b3_di_curve_feature, value_name_regex: '^(is_interpolated|is_extrapolated)$'}
    model_default: true
    model_default_reason: Include DI curve construction flags as binary diagnostics.
    semantic_type: curve_construction_flag
    raw_unit: boolean
    stationarity: binary
    preprocessing: {transform: binary, winsorization: none, winsor_lower: null, winsor_upper: null, hard_min: null, hard_max: null, scaler: none, fit_scope: train_only, missing_policy: false_fill, positive_required: false, allow_negative: false, notes: Binary interpolation and extrapolation flags use false-fill and no fitted statistics.}
  - rule_id: b3_futures_feature_log_settlement
    priority: 650
    selector: {source_family: b3_futures_feature, value_name: log_settlement}
    model_default: true
    model_default_reason: Canonical upgraded continuous-futures log settlement feature.
    semantic_type: futures_log_quote_level
    raw_unit: log_quote
    stationarity: stationaryish
    preprocessing: {transform: already_log, winsorization: train_quantile, winsor_lower: 0.001, winsor_upper: 0.999, hard_min: null, hard_max: null, scaler: train_robust_zscore, fit_scope: train_only, missing_policy: preserve_null_add_mask, positive_required: false, allow_negative: true, notes: Emitted log settlements are already transformed and remain unpreprocessed in the feature panel.}
  - rule_id: b3_futures_feature_log_returns
    priority: 660
    selector: {source_family: b3_futures_feature, value_name_regex: '^(log_return_[0-9]+bd|same_contract_log_return_1bd)$'}
    model_default: true
    model_default_reason: Canonical upgraded continuous-futures return features.
    semantic_type: futures_log_return
    raw_unit: log_return
    stationarity: stationaryish
    preprocessing: {transform: already_return, winsorization: train_quantile, winsor_lower: 0.001, winsor_upper: 0.999, hard_min: null, hard_max: null, scaler: train_robust_zscore, fit_scope: train_only, missing_policy: preserve_null_add_mask, positive_required: false, allow_negative: true, notes: Log returns are already return-like and use train-only robust treatment.}
  - rule_id: b3_futures_feature_realized_vol
    priority: 670
